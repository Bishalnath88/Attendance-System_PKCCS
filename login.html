<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding for international characters -->
  <meta charset="UTF-8">
  <!-- Responsive design viewport settings -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Page title shown in browser tab -->
  <title>Login - Student Attendance System</title>
  
  <!-- Bootstrap 5 CSS framework for responsive UI components -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome icons library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom application stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Authentication utilities module for token management -->
  <script src="auth.js?v=2024"></script>
  
  <script>
    // If user is already authenticated (has token),
    // redirect to dashboard instead of showing login page
    window.redirectIfAuthenticated("dashboard.html")
  </script>
  
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #153e64 0%, #719dd2 45%, #a0c8ff 100%);
      background-attachment: fixed;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 460px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .login-container::before {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      width: calc(100% - 32px);
      height: calc(100% - 32px);
      border-radius: 32px;
      background: rgba(15, 23, 42, 0.14);
      filter: blur(28px);
      z-index: -1;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.28);
      padding: 40px;
      backdrop-filter: blur(21px);
      color: #f1f5f9;
    }

    .login-card h1,
    .login-card p,
    .login-card label,
    .login-card .helper-text,
    .login-card .divider span,
    .login-card .input-group-text {
      color: #e2e8f0;
    }

    .login-header h1 {
      font-size: 1.95rem;
      font-weight: 800;
      color: #f8fafc;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #cbd5e1;
      margin: 0;
    }

    .form-label {
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
    }

    .form-control {
      padding: 12px 15px;
      border-radius: 12px;
      border: 1px solid rgba(226, 232, 240, 0.28);
      background: rgba(15, 23, 42, 0.12);
      color: #f8fafc;
    }

    .form-control::placeholder {
      color: rgba(226, 232, 240, 0.7);
    }

    .form-control:focus {
      border-color: rgba(79, 70, 229, 0.9);
      box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.18);
      background: rgba(255, 255, 255, 0.12);
      color: #f8fafc;
    }

    .input-group-text {
      background: rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-right: none;
      border-radius: 12px 0 0 12px;
      color: #cbd5e1;
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      position: relative;
    }

    .divider span {
      background: rgba(255, 255, 255, 0.12);
      padding: 1px 10px;
      display: inline-block;
      position: relative;
      color: #f8fafc;
      font-size: 0.92rem;
      border-radius: 999px;
      border: 1px solid rgba(226, 232, 240, 0.2);
      backdrop-filter: blur(8px);
    }

    .helper-text {
      margin-top: 18px;
      text-align: center;
      color: #cbd5e1;
      font-size: 0.92rem;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header i {
      width: 82px;
      height: 82px;
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.15);
      margin-bottom: 18px;
    }

    .login-header .college-logo {
      width: 82px;
      height: 82px;
      object-fit: cover;
      border-radius: 24px;
      margin: 0 auto 18px auto;
      display: block;
    }

    .login-header h1 {
      font-size: 1.95rem;
      font-weight: 800;
      color: #f8fafc;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #cbd5e1;
      margin: 0;
    }

    .form-label {
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
    }

    .form-control {
      padding: 12px 15px;
      border-radius: 12px;
      border: 1px solid rgba(226, 232, 240, 0.28);
      background: rgba(15, 23, 42, 0.12);
      color: #f8fafc;
    }

    .form-control:focus {
      border-color: rgba(79, 70, 229, 0.9);
      box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.18);
    }

    .input-group-text {
      background: rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-right: none;
      border-radius: 12px 0 0 12px;
      color: #cbd5e1;
    }

    .input-group .form-control {
      border-left: none;
      border-radius: 0 12px 12px 0;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #4f46e5 0%, #1d4ed8 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 18px 32px rgba(79, 70, 229, 0.22);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 36px rgba(79, 70, 229, 0.26);
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      position: relative;
    }

    .divider span {
      background: rgba(255, 255, 255, 0.12);
      padding: 1px 10px;
      display: inline-block;
      position: relative;
      color: #f8fafc;
      font-size: 0.92rem;
      border-radius: 999px;
      border: 1px solid rgba(226, 232, 240, 0.2);
      backdrop-filter: blur(8px);
    }

    .btn-login:disabled,
    .btn-outline-primary:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    @media (max-width: 576px) {
      .login-card {
        padding: 28px 24px;
      }

      .login-header h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="clg_logo.png" alt="College Logo" class="college-logo">
        <h1>Computer Science Department</h1>
        <p>Sign in to student attendance portal</p>
      </div>

      <div id="feedback" class="alert d-none" role="alert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="fas fa-envelope"></i>
            </span>
            <input type="email" class="form-control" id="email" placeholder="Enter your email" autocomplete="email" required>
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="fas fa-lock"></i>
            </span>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" autocomplete="current-password" minlength="6" required>
          </div>
        </div>

        <button type="submit" class="btn btn-login" id="loginBtn">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>

        <div class="divider">
          <span>Need an account first?</span>
        </div>

        <button type="button" class="btn btn-outline-primary w-100" id="registerBtn" style="border-radius: 12px;">
          <i class="fas fa-user-plus me-2"></i>Create Account
        </button>
      </form>

      <p class="helper-text mb-0">Passwords now require at least 6 characters.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const loginForm = document.getElementById("loginForm")
    const loginBtn = document.getElementById("loginBtn")
    const registerBtn = document.getElementById("registerBtn")
    const emailInput = document.getElementById("email")
    const passwordInput = document.getElementById("password")
    const feedback = document.getElementById("feedback")

    function showFeedback(message, type = "danger") {
      feedback.textContent = message
      feedback.className = `alert alert-${type}`
    }

    function clearFeedback() {
      feedback.textContent = ""
      feedback.className = "alert d-none"
    }

    function setSubmitting(isSubmitting, button, text, iconClass) {
      button.disabled = isSubmitting
      button.innerHTML = isSubmitting
        ? '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Please wait'
        : `<i class="${iconClass} me-2"></i>${text}`
    }

    async function handleLogin(event) {
      event.preventDefault()
      clearFeedback()

      const email = emailInput.value.trim().toLowerCase()
      const password = passwordInput.value.trim()

      if (!email || !password) {
        showFeedback("Please fill in both email and password.")
        return
      }

      setSubmitting(true, loginBtn, "Sign In", "fas fa-sign-in-alt")

      try {
        const result = await window.apiRequest("/login", {
          method: "POST",
          auth: false,
          body: { email, password }
        })

        window.saveAuthSession(result.token, result.email || email)
        window.location.replace("dashboard.html")
      } catch (error) {
        showFeedback(error.message || "Unable to sign in right now.")
      } finally {
        setSubmitting(false, loginBtn, "Sign In", "fas fa-sign-in-alt")
      }
    }

    async function handleRegister() {
      clearFeedback()

      const email = emailInput.value.trim().toLowerCase()
      const password = passwordInput.value.trim()

      if (!email || !password) {
        showFeedback("Please enter both email and password to create an account.")
        return
      }

      if (password.length < 6) {
        showFeedback("Password must be at least 6 characters long.")
        return
      }

      setSubmitting(true, registerBtn, "Create Account", "fas fa-user-plus")

      try {
        const result = await window.apiRequest("/register", {
          method: "POST",
          auth: false,
          body: { email, password }
        })
        showFeedback(result.message || "Registration successful. You can sign in now.", "success")
      } catch (error) {
        showFeedback(error.message || "Unable to register right now.")
      } finally {
        setSubmitting(false, registerBtn, "Create Account", "fas fa-user-plus")
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loginForm.addEventListener("submit", handleLogin)
      registerBtn.addEventListener("click", handleRegister)
      emailInput.addEventListener("input", clearFeedback)
      passwordInput.addEventListener("input", clearFeedback)
    })
  </script>
</body>
</html>
