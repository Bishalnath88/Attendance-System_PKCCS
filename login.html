<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding for international characters -->
  <meta charset="UTF-8">
  <!-- Responsive design viewport settings -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Page title shown in browser tab -->
  <title>Login - Student Attendance System</title>
  
  <!-- FontAwesome icons library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom application stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Authentication utilities module for token management -->
  <script src="auth.js?v=2024"></script>
  
  <script>
    // If user is already authenticated (has token),
    // redirect to dashboard instead of showing login page
    window.redirectIfAuthenticated("dashboard.html")
  </script>
  
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 30%),
        linear-gradient(135deg, #4f46e5 0%, #0f172a 100%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 460px;
      padding: 24px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.22);
      padding: 40px;
      backdrop-filter: blur(8px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header i {
      width: 82px;
      height: 82px;
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.1);
      margin-bottom: 18px;
    }

    .login-header h1 {
      font-size: 1.95rem;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #64748b;
      margin: 0;
    }

    .form-label {
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .form-input {
      padding: 12px 15px;
      border-radius: 12px;
      border: 1px solid #dbe2ea;
      font-size: 1rem;
      font-family: inherit;
      width: 100%;
    }

    .form-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.18);
      outline: none;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .input-group-text {
      background: transparent;
      border: 1px solid #dbe2ea;
      border-right: none;
      border-radius: 12px 0 0 12px;
      color: #64748b;
      padding: 12px 15px;
    }

    .input-group {
      display: flex;
    }

    .input-group .form-input {
      border-left: none;
      border-radius: 0 12px 12px 0;
    }

    .alert {
      padding: 12px 15px;
      border-radius: 12px;
      border: 1px solid;
      margin-bottom: 1rem;
    }

    .alert.hidden {
      display: none;
    }

    .alert.alert-danger {
      background-color: #fee2e2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .alert.alert-success {
      background-color: #dcfce7;
      border-color: #bbf7d0;
      color: #166534;
    }

    .spacing-right {
      margin-right: 8px;
    }

    .width-full {
      width: 100%;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #4f46e5 0%, #1d4ed8 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 18px 32px rgba(79, 70, 229, 0.22);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 36px rgba(79, 70, 229, 0.26);
    }

    .btn-login:disabled,
    .btn-outline-primary:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      position: relative;
    }

    .divider::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: #e2e8f0;
    }

    .divider span {
      background: white;
      padding: 0 16px;
      position: relative;
      color: #64748b;
      font-size: 0.92rem;
    }

    .helper-text {
      margin-top: 18px;
      text-align: center;
      color: #64748b;
      font-size: 0.92rem;
    }

    @media (max-width: 576px) {
      .login-card {
        padding: 28px 24px;
      }

      .login-header h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-graduation-cap"></i>
        <h1>Welcome Back</h1>
        <p>Sign in to manage students, attendance, and reports.</p>
      </div>

      <div id="feedback" class="alert hidden" role="alert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="fas fa-envelope"></i>
            </span>
            <input type="email" class="form-input" id="email" placeholder="Enter your email" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="fas fa-lock"></i>
            </span>
            <input type="password" class="form-input" id="password" placeholder="Enter your password" autocomplete="current-password" minlength="6" required>
          </div>
        </div>

        <button type="submit" class="btn btn-login" id="loginBtn">
          <i class="fas fa-sign-in-alt spacing-right"></i>Sign In
        </button>

        <div class="divider">
          <span>Need an account first?</span>
        </div>

        <button type="button" class="btn btn-outline-primary width-full" id="registerBtn" style="border-radius: 12px;">
          <i class="fas fa-user-plus spacing-right"></i>Create Account
        </button>
      </form>

      <p class="helper-text mb-0">Passwords now require at least 6 characters.</p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm")
    const loginBtn = document.getElementById("loginBtn")
    const registerBtn = document.getElementById("registerBtn")
    const emailInput = document.getElementById("email")
    const passwordInput = document.getElementById("password")
    const feedback = document.getElementById("feedback")

    function showFeedback(message, type = "danger") {
      feedback.textContent = message
      feedback.className = `alert alert-${type}`
      feedback.classList.remove("hidden")
    }

    function clearFeedback() {
      feedback.textContent = ""
      feedback.className = "alert hidden"
    }

    function setSubmitting(isSubmitting, button, text, iconClass) {
      button.disabled = isSubmitting
      button.innerHTML = isSubmitting
        ? '<span class="spinner"></span>Please wait'
        : `<i class="${iconClass} spacing-right"></i>${text}`
    }

    async function handleLogin(event) {
      event.preventDefault()
      clearFeedback()

      const email = emailInput.value.trim().toLowerCase()
      const password = passwordInput.value.trim()

      if (!email || !password) {
        showFeedback("Please fill in both email and password.")
        return
      }

      setSubmitting(true, loginBtn, "Sign In", "fas fa-sign-in-alt")

      try {
        const result = await window.apiRequest("/login", {
          method: "POST",
          auth: false,
          body: { email, password }
        })

        window.saveAuthSession(result.token, result.email || email)
        window.location.replace("dashboard.html")
      } catch (error) {
        showFeedback(error.message || "Unable to sign in right now.")
      } finally {
        setSubmitting(false, loginBtn, "Sign In", "fas fa-sign-in-alt")
      }
    }

    async function handleRegister() {
      clearFeedback()

      const email = emailInput.value.trim().toLowerCase()
      const password = passwordInput.value.trim()

      if (!email || !password) {
        showFeedback("Please enter both email and password to create an account.")
        return
      }

      if (password.length < 6) {
        showFeedback("Password must be at least 6 characters long.")
        return
      }

      setSubmitting(true, registerBtn, "Create Account", "fas fa-user-plus")

      try {
        const result = await window.apiRequest("/register", {
          method: "POST",
          auth: false,
          body: { email, password }
        })
        showFeedback(result.message || "Registration successful. You can sign in now.", "success")
      } catch (error) {
        showFeedback(error.message || "Unable to register right now.")
      } finally {
        setSubmitting(false, registerBtn, "Create Account", "fas fa-user-plus")
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loginForm.addEventListener("submit", handleLogin)
      registerBtn.addEventListener("click", handleRegister)
      emailInput.addEventListener("input", clearFeedback)
      passwordInput.addEventListener("input", clearFeedback)
    })
  </script>
</body>
</html>
